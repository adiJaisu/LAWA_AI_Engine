  video_decoder:
    # image: ai-vms-video_decoder:latest
    build:
      context: ./Video_decoder
      dockerfile: Dockerfile
    container_name: ai_vms_video_decoder
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./.env
    environment:
      PG_HOST: localhost
      PG_PORT: "5432"
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DATABASE: ${PG_DATABASE}
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: "5672"
      PYTHONUNBUFFERED: "1"
      HOST_APP_PATH: ${PWD}/Video_decoder
    depends_on:
      db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ./Video_decoder/config.yaml:/app/config.yaml:ro
      - ./Video_decoder/input:/app/input
      - ./Video_decoder/logs:/app/logs
      - ./Video_decoder:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - /dev/dri:/dev/dri
    privileged: true
    user: "0:0"

volumes:
  postgres_data:
  rabbitmq_data:
  event_evidence:

networks:
  lawa_network:
    driver: bridge
