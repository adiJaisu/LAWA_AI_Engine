name: ai-vms
version: "3.8"

services:
  rabbitmq:
    image: ai-vms-rabbitmq:latest
    # build:
    #   context: ./Video_decoder/docker_env/rabbitmq
    container_name: rabbitmq_service
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "user"
      RABBITMQ_DEFAULT_PASS: "password"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lawa_network

  postgres:
    image: postgres:15
    container_name: postgres_ai_vms
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_ROOT_PASSWORD: ${PG_ROOT_PASSWORD}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DATABASE}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lawa_network

  db-init:
    image: postgres:15
    container_name: ai_vms_db_init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      PGPASSWORD: ${PG_PASSWORD}
    volumes:
      - ./postgres-init/create_db_tables.sql:/create_db_tables.sql:ro
      - ./postgres-init/insert_default_data.sql:/insert_default_data.sql:ro
    command: >
      sh -c " psql -h postgres -U ${PG_USER} -d ${PG_DATABASE} -f /create_db_tables.sql && psql -h postgres -U ${PG_USER} -d ${PG_DATABASE} -f /insert_default_data.sql "
    networks:
      - lawa_network

  backend:
    image: ai-vms-backend:latest
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    env_file:
      - ./.env
    container_name: ai_vms_api
    working_dir: /app
    volumes:
      - ./backend/ai_vms:/app/ai_vms
      - ./Video_decoder/input:/app/input
    ports:
      - "${BACKEND_PORT}:8010"
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      # --- Postgres SQLAlchemy URLs ---
      DB_URL_SYNC: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}
      DB_URL_ASYNC: postgresql+asyncpg://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}
      TEST_DB_URL_ASYNC: postgresql+asyncpg://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE}_test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lawa_network

  frontend:
    image: ai-vms-frontend:latest
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    env_file:
      - ./.env
    container_name: ai_vms_frontend
    working_dir: /frontend/ai_vms
    volumes:
      - ./frontend/ai_vms:/frontend/ai_vms
      - /frontend/ai_vms/node_modules
    ports:
      - "${FRONTEND_PORT}:5173"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - lawa_network

  websocket-hub:
    build:
      context: ./WebSocketService
      dockerfile: Dockerfile
    container_name: lawa_websocket_hub
    environment:
      - WEBSOCKET_PORT=9004
      - WEBSOCKET_HOST=0.0.0.0
    ports:
      - "9004:9004"
    networks:
      - lawa_network

  event-manager:
    build: 
      context: ./EventManager
      dockerfile: Dockerfile
    container_name: lawa_event_manager
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      websocket-hub:
        condition: service_started
    env_file:
      - ./.env
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=user
      - RABBITMQ_PASSWORD=password
      - EXCHANGE_NAME=LAWA_exchange
      - EXCHANGE_TYPE=direct
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${PG_DATABASE}
      - DB_USER=${PG_USER}
      - DB_PASSWORD=${PG_PASSWORD}
      - WEBSOCKET_HOST=websocket-hub
      - WEBSOCKET_PORT=9004
      - EVIDENCE_VIDEO_FPS=1
    volumes:
      - ./EventManager/evidence_storage:/app/evidence_storage
      - ./logs/event-manager:/app/logs
      - ./EventManager/src:/app/src
    networks:
      - lawa_network

  ai-inference-detection:
    build:
      context: ./ai-inference-detection
      dockerfile: Dockerfile
    container_name: lawa_ai_inference_detection
    ipc: shareable
    shm_size: 1gb 
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=user
      - RABBITMQ_PASSWORD=password
      - EXCHANGE_NAME=LAWA_exchange
      - EXCHANGE_TYPE=direct
      - NUMBERS_OF_WORKER=2
      - DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./logs/ai-inference-detection:/app/logs
      - ./Ai_services/Ai_engine/src:/app/src
    networks:
      - lawa_network

  ai-inference-classification:
      build:
        context: ./ai-inference-classification
        dockerfile: Dockerfile
      container_name: lawa_ai_inference_classification
      ipc: shareable
      shm_size: 1gb
      depends_on:
        rabbitmq:
          condition: service_healthy
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      environment:
        - RABBITMQ_HOST=rabbitmq
        - RABBITMQ_PORT=5672
        - RABBITMQ_USERNAME=user
        - RABBITMQ_PASSWORD=password
        - EXCHANGE_NAME=LAWA_exchange
        - EXCHANGE_TYPE=direct
        - NUMBERS_OF_WORKER=2
        - DEVICE=cuda
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      volumes:
        - ./logs/ai-inference-classification:/app/logs
        - ./Ai_services/Ai_engine/src:/app/src
      networks:
        - lawa_network

  ai-inference-segmentation:
    build:
      context: ./ai-inference-segmentation
      dockerfile: Dockerfile
    container_name: lawa_ai_inference_segmentation
    ipc: shareable
    shm_size: 1gb
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=user
      - RABBITMQ_PASSWORD=password
      - EXCHANGE_NAME=LAWA_exchange
      - EXCHANGE_TYPE=direct
      - NUMBERS_OF_WORKER=2
      - DEVICE=cuda
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./logs/ai-inference-segmentation:/app/logs
      - ./Ai_services/Ai_engine/src:/app/src
    networks:
      - lawa_network
 

  ai-crowd-density:
    build:
      context: ./ai-crowd-density
      dockerfile: Dockerfile
    container_name: lawa_ai_crowd_density
    # ipc: service:ai-inference-detection
    # ipc: service:ai-inference-classification
    ipc: service:ai-inference-segmentation
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=user
      - RABBITMQ_PASSWORD=password
      - EXCHANGE_NAME=LAWA_exchange
      - EXCHANGE_TYPE=direct
      - QUEUE_NAME=queue_crowd_density
      - EVENT_MANAGER_QUEUE=crowd_density_event_queue
    volumes:
      - ./logs/ai-crowd-density:/app/logs
      - ./Ai_services/Ai_engine/src:/app/src
    networks:
      - lawa_network

